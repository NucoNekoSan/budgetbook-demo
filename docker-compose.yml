services:
  budgetbook:
    build:
      context: .
      dockerfile: Dockerfile
    image: budgetbook:latest
    container_name: budgetbook
    restart: unless-stopped
    # セルフホスト: budgetbook/.env を使う（.env.example をコピーして編集してください）
    env_file:
      - ./budgetbook/.env
    environment:
      # Docker 内では永続化ディレクトリ配下に DB を置く
      DJANGO_DB_PATH: /app/data/db.sqlite3
      # OS のタイムゾーンも JST に揃え、gunicorn のアクセスログと
      # Django (USE_TZ=True / TIME_ZONE=Asia/Tokyo) のログを同一 TZ に
      TZ: Asia/Tokyo
    expose:
      - "8010"
    volumes:
      - ./data:/app/data
      - ./backup:/app/backup
      - ./staticfiles:/app/staticfiles
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  proxy:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: budgetbook-proxy
    depends_on:
      budgetbook:
        condition: service_healthy
    restart: unless-stopped
    # 公開ポート方針:
    # - 127.0.0.1:8010 のみ → Cloudflare Tunnel 経由で外部公開する場合
    # - 0.0.0.0:8010 → 同一 LAN 内の iPad/スマホからもアクセスする場合（プライベート用途）
    # 自宅ルーターの 80/443 ポート開放は絶対にしないこと。
    ports:
      - "0.0.0.0:8010:8080"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/var/www/static:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/cache/nginx:size=64m,uid=101,gid=101
      - /var/run:size=16m,uid=101,gid=101
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
