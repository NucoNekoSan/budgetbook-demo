# BudgetBook Docker internal reverse proxy.
# TLS is terminated by Cloudflare in production. Local smoke tests use plain HTTP.

map $http_x_forwarded_proto $budgetbook_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

upstream budgetbook_app {
    server budgetbook:8010;
}

server {
    # nginx-unprivileged runs as non-root, so listen on 8080 inside the container.
    listen 8080;
    server_name _;

    server_tokens off;
    client_max_body_size 5m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Frame-Options "DENY" always;

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-Frame-Options "DENY" always;
        # ファイル名にハッシュが付かない構成のため immutable は付けない。
        # クエリ文字列 ?v=STATIC_VERSION で更新時のキャッシュ破棄を行う。
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://budgetbook_app;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $budgetbook_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
